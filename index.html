<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grand Mist — Admin</title>
    <meta name="description" content="The Grand Mist Resort Administration — Single Page Application">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="css/style.css?v=1.0.2">
</head>

<body>

    <!-- ── EMAIL VERIFY INTERCEPTOR (must run before Supabase initialises) ── -->
    <script>
        (function () {
            var h = window.location.hash, s = window.location.search;
            if (h.includes('type=signup') || h.includes('type=email') || s.includes('code=')) {
                window.location.replace('verify.html' + s + h);
            }
        })();
    </script>

    <!-- ── SESSION CHECK (Supabase Auth) ─────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/core/supabase-client.js"></script>
    <script>
        (async function () {
            // Check Supabase session first, fall back to localStorage
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            if (!session) window.location.replace('login.html');
        })();
    </script>


    <!-- ── APP LAYOUT ─────────────────────────────────────────── -->
    <div id="app">

        <!-- SIDEBAR -->
        <aside id="sidebar" role="navigation" aria-label="Main navigation">
            
            <!-- Sidebar toggle arrow — moved inside sidebar for perfect persistent alignment -->
            <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">‹</button>

            <!-- Branding — top of sidebar -->
            <div class="sidebar-brand">
                <div class="sidebar-brand-logo"><img src="assets/logo.png" alt="Grand Mist Logo" style="width:100%; height:100%; object-fit:contain;"></div>
                <div class="sidebar-brand-text">
                    <span class="brand-name">The Grand Mist</span>
                    <span class="brand-location" id="brand-tag">KODAIKANAL · ADMIN</span>
                </div>
            </div>

            <!-- Nav links (injected by nav.js) -->
            <nav class="sidebar__nav" id="sidebar-nav"></nav>

            <!-- Footer watermark -->
            <div class="sidebar__footer" style="flex-direction: column; gap: 0.5rem; text-align: center;">
                <button class="header__logout mobile-logout" id="mobile-logout-btn" aria-label="Log out" style="width: 100%; border-color: rgba(224, 92, 92, 0.4); color: var(--red);">Log out</button>
                <span class="sidebar__mist-logo">THE GRAND MIST . 2026 </span>
            </div>

        </aside>

        <!-- MAIN COLUMN -->
        <div id="page-wrapper">

            <!-- TOP HEADER — admin info only, right-aligned -->
            <header id="top-header" role="banner">
                <!-- Hamburger menu (mobile only) -->
                <button class="hamburger" id="hamburger" aria-label="Menu">
                    <svg class="hamburger-arrow" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
                
                <!-- Mobile Brand Header (Visible only on mobile) -->
                <div class="header__mobile-brand">The Grand Mist</div>

                <div class="header__spacer"></div>
                
                <!-- NOTIFICATIONS -->
                <div class="header__notifications" id="header-notifications">
                    <button class="notifications__btn" id="notif-btn" title="Smart Alerts">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bell-icon"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
                        <span class="notifications__badge hidden" id="notif-badge">0</span>
                    </button>
                    <div class="notifications__dropdown" id="notif-dropdown">
                        <div class="notifications__header">
                            <h3>Smart Alerts</h3>
                            <button class="notifications__clear" id="notif-clear-all">Clear All</button>
                        </div>
                        <div class="notifications__list" id="notif-list">
                            <!-- Injected by notifications.js -->
                            <div class="notifications__empty">
                                <span class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></span>
                                <p>No new alerts</p>
                            </div>
                        </div>
                        <div class="notifications__footer">
                            <button class="notifications__clear" id="notif-close">Close</button>
                        </div>
                    </div>
                </div>

                <div class="header__admin">
                    <div class="header__admin-info" id="header-admin-info">
                        <div class="header__admin-name" id="header-name">Admin</div>
                        <div class="header__admin-role" id="header-role">Manager</div>
                    </div>
                    <div class="header__profile" id="header-profile" style="position: relative; cursor: pointer;">
                        <div class="header__avatar" id="header-avatar">A</div>
                        <div class="profile-dropdown" id="profile-dropdown" style="display: none; position: absolute; top: calc(100% + 10px); right: 0; background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.5rem; box-shadow: var(--shadow-lg); z-index: 1000; min-width: 140px;">
                            <button class="header__logout" id="logout-btn" aria-label="Log out" style="width: 100%; background: transparent; border: none; text-align: left; display: block !important;">Log out</button>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Page content injected by router -->
            <main id="main-content" role="main">
                <div class="page-header" id="initial-loader">
                    <h1>Connecting...</h1>
                    <p>Establishing secure connection to Grand Mist Cloud...</p>
                </div>
            </main>

        </div><!-- end page-wrapper -->

    </div><!-- end app -->

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>



    <!-- ── DATA + UTILS ──────────────────────────────────────── -->
    <script src="js/room-cache.js"></script>
    <script src="js/core/mockdata.js"></script>
    <script src="js/notifications.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script src="js/core/utils.js"></script>

    <!-- ── NAV + ROUTER (after MockData.init()) ───────────────── -->
    <script src="js/components/nav.js"></script>
    <script>
        // Wait for Supabase data before starting router
        MockData.init().then(() => {
            const s = document.createElement('script');
            s.src = 'js/router.js';
            document.body.appendChild(s);
        });
    </script>

</body>

</html>
